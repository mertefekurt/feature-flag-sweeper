<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Feature Flag Sweeper cover">

  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#a78bfa" stop-opacity=".34"/>
      <stop offset=".54" stop-color="#1d102b" stop-opacity="0"/>
      <stop offset="1" stop-color="#f472b6" stop-opacity=".30"/>
    </linearGradient>
    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency=".85" numOctaves="2" seed="83" result="noise"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 .10"/></feComponentTransfer>
      <feBlend mode="soft-light" in2="SourceGraphic"/>
    </filter>
  </defs>
  <rect width="1280" height="420" rx="30" fill="#1d102b"/>
  <rect width="1280" height="420" rx="30" fill="url(#g)" filter="url(#grain)"/>

  <rect x="64" y="62" width="1152" height="296" rx="34" fill="#faf5ff" opacity=".055"/>
  <path d="M104 108h390" stroke="#a78bfa" stroke-width="12" stroke-linecap="round"/>
  <text x="104" y="196" fill="#faf5ff" font-family="Inter, ui-sans-serif, system-ui" font-size="60" font-weight="850">Feature Flag Sweeper</text>
  <text x="108" y="248" fill="#e9d5ff" font-family="Inter, ui-sans-serif, system-ui" font-size="23">Find stale and risky feature flags in config...</text>
  <text x="108" y="308" fill="#f472b6" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" font-weight="800">DEVELOPER TOOL</text>
  <rect x="846" y="122" width="152" height="28" rx="8" fill="#a78bfa" opacity=".85"/>
  <text x="862" y="141" fill="#faf5ff" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">ownerless-flag</text>
  <rect x="846" y="176" width="216" height="28" rx="8" fill="#f472b6" opacity=".85"/>
  <text x="862" y="195" fill="#faf5ff" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">permanent-flag</text>
